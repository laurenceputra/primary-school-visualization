name: Refresh official data

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild data files
        run: npm run build:data

      - name: Verify site build
        run: npm run build

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- public/data; then
            echo "No data updates detected"
            exit 0
          fi
          git add public/data
          GIT_AUTHOR_NAME=github-actions GIT_AUTHOR_EMAIL=github-actions@github.com GIT_COMMITTER_NAME=github-actions GIT_COMMITTER_EMAIL=github-actions@github.com git commit -m "refresh official school data"
          git push
